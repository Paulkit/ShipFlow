services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - .:/var/www/html:delegated
      - vendor:/var/www/html/vendor
    depends_on:
      - mysql
      - redis
    networks:
      - shipflow

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - shipflow

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: shipflow
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shipflow

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - shipflow

volumes:
  mysql_data:
  vendor:

networks:
  shipflow:
    driver: bridge
